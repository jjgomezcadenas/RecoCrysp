# Resolution example (tutorial) — Derenzo phantom in water, with attenuation
# correction and the 3.5 mm detector resolution. All parameters are tunable here.

[scanner]            # continuous (monolithic) CRYSP scanner
diameter = 774.0     # mm
afov     = 1024.0    # mm

[grid]               # fine voxels: needed to render the small rods and the blur
n       = [145, 145, 81]
voxsize = 1.25       # mm, isotropic

[derenzo]            # hot rods in 6 sectors, inside a water cylinder
radius        = 80.0                        # cylinder radius, mm
length        = 100.0                       # axial extent, mm
rod_diameters = [2.5, 3.0, 3.5, 4.0, 5.0, 6.0]  # mm, one per sector
spacing       = 2.0                         # centre-to-centre = spacing * diameter

[phantom]
mu_water = 0.0096    # mm^-1, attenuation of the water cylinder at 511 keV

[resolution]
fwhm = 3.5           # mm, detector point-spread (CRYSP)

[sim]
n_lors       = 5000000
total_counts = 2.0e8
seed         = 1

[recon]
niter = 20
