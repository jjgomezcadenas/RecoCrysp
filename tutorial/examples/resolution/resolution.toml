# Resolution example (tutorial) — Derenzo phantom in water, with attenuation
# correction and the detector resolution (exaggerated to 5 mm). All parameters are tunable here.

[scanner]            # continuous (monolithic) CRYSP scanner
diameter = 774.0     # mm
afov     = 1024.0    # mm

[grid]               # heavy but tunable: lower n_lors / raise voxsize to run lighter
n       = [181, 181, 101]
voxsize = 1.0       # mm, isotropic

[derenzo]            # hot rods in 6 sectors, inside a water cylinder
radius        = 80.0                        # cylinder radius, mm
length        = 100.0                       # axial extent, mm
rod_diameters = [3.0, 4.0, 5.0, 6.0, 8.0, 10.0]  # mm, one per sector
spacing       = 2.0                         # centre-to-centre = spacing * diameter

[phantom]
mu_water = 0.0096    # mm^-1, attenuation of the water cylinder at 511 keV

[resolution]
fwhm = 5.0           # mm, detector point-spread (CRYSP)

[sim]
n_lors       = 100000000
total_counts = 1.0e9
seed         = 1

[recon]
niter = 50
