# NEMA NU-2 IQ phantom, WATER body, LOW activity (LA) -- the full-physics contrast
# case. Six hot spheres (Ø 10-37 mm) at 4:1 in a water cylinder (R=10 cm, half 9 cm),
# so all three corrections are present and -- unlike the uniform sphere -- VISIBLE:
# attenuation (μ_water), Compton scatter (20.5%), randoms (3.2%). Reconstruct
# gold(trues, AC) / uncorr(prompts, AC only) / corr(prompts, AC+scatter+randoms) and
# measure per-sphere CRC + background CoV. Recon = De Pierro quadratic (OSL Huber
# diverges under attenuation). Locked recipe: 2.5 mm, 500 M sens, niter 30.

tag = "nema_la_water_bgo"

[data]
lors = "/Users/jjgomezcadenas/Projects/PTCryspMC.jl/prod/nema_la_water_bgo/lors_det.h5"

[scanner]
sample_radius_mm = 405.5
afov_mm          = 1024.0

[phantom]
radius_mm = 100.0          # body cylinder radius (sinogram edge marker; = NEMA_BODY_R_MM)

[attenuation]
mu_per_cm = 0.096          # water at 511 keV (narrow-beam; trues-only ⇒ exact)
# body geometry for the cylinder chord is taken from NEMA_BODY_R_MM / NEMA_BODY_HALF_MM.

[grid]
n       = [91, 91, 73]
voxsize = 2.5              # -> extent +-112.5 (x,y), +-90 (z) mm; resolves the 10 mm sphere

[sens]
n_sample_lors = 500000000  # locked recipe: sample Aᵀ(a) below the noise floor
seed          = 1

[recon]                    # MLEM + Gaussian post-filter: stable under attenuation
niter      = 30            #   (plain MLEM, x⁺=t/sens, doesn't divide by sens+∇R so it
method     = "mlem"        #   can't diverge like OSL Huber) AND contrast-preserving --
quad_beta  = 1000.0        #   De Pierro quadratic erases the hot spheres on a CONTRAST
huber_beta  = 1000.0       #   phantom. Post-filter ≈ Huber > quadratic (air-NEMA frontier).
huber_delta = 0.05         #   "mlem" | "quadratic" (De Pierro) | "huber" (OSL)

[postfilter]
fwhm_mm = 8.0              # Gaussian post-filter (air-NEMA scan_fwhm sweet spot)

[scatter]                  # smoothed scatter model in sinogram coords (truth==1)
intensity_scale = true    # contamination = fraction * mult*fwd(x_uncorr): puts the
scale     = 1.0          # heuristic multiplier on the scatter term (diagnostic ladder
                          #   1.2/1.5/2.0: residual closes UNIFORMLY, gold reached ~1.5,
                          #   but that is truth-tuned -> default 1.0, the honest intensity fix).
                          #   additive term on the forward-model intensity scale (else
                          #   ~12x too small for listmode -> negligible correction).
use_phi   = false         # 4-coord (s,phi,z_m,dz) model localizes scatter under the
n_phi     = 12            #   off-centre spheres, but with the scale fixed it is a WASH on
smooth_phi = 1.0          #   the mean (helps large spheres, hurts small at n_phi=12; sparse
                          #   stats). Kept as infrastructure; default OFF (3-coord).
n_sr      = 40
n_zm      = 40
n_dz      = 16
sr_max_mm = 200.0
zm_max_mm = 180.0
dz_max_mm = 400.0
smooth_sr = 0.0            # keep the sharp scatter-fraction edge at the body radius
smooth_zm = 1.5
smooth_dz = 1.0

[randoms]                  # smoothed randoms model in sinogram coords (truth==2)
n_sr      = 40
n_zm      = 40
n_dz      = 16
sr_max_mm = 200.0
zm_max_mm = 180.0
dz_max_mm = 400.0
smooth_sr = 0.0
smooth_zm = 1.5
smooth_dz = 1.0

[roi]
sphere_shrink_mm = 0.0     # sphere VOI = true diameter
bg_r_max_mm      = 30.0    # central sphere-free background ROI
bg_z_half_mm     = 10.0

# --- systematic method comparison (compare_methods.jl) -------------------------
# Each [[variant]] is reconstructed gold/uncorr/corr on the SAME data + AC sens
# (built/cached once) and written to out/nema_la_water_bgo_<tag>.npz. Add entries
# (e.g. quad_b300, quad_b3000) to scan a parameter -- the tag must stay unique.
# niter defaults to [recon].niter; override per variant with niter = N.
[[variant]]
tag    = "mlem"            # MLEM + Gaussian post-filter (baseline)
method = "mlem"
fwhm_mm = 8.0

# MLEM post-filter fwhm scan -- the linear-smoother frontier (does Huber beat it?)
[[variant]]
tag     = "mlem_f0"
method  = "mlem"
fwhm_mm = 0.0
[[variant]]
tag     = "mlem_f4"
method  = "mlem"
fwhm_mm = 4.0
[[variant]]
tag     = "mlem_f6"
method  = "mlem"
fwhm_mm = 6.0

# De Pierro quadratic smoothness -- β scan (β=1000 washed contrast; scan downward)
[[variant]]
tag = "quad_b10"
method = "quadratic"
beta = 10.0
[[variant]]
tag = "quad_b30"
method = "quadratic"
beta = 30.0
[[variant]]
tag = "quad_b100"
method = "quadratic"
beta = 100.0
[[variant]]
tag = "quad_b300"
method = "quadratic"
beta = 300.0

# OSL Huber (safeguarded) -- β scan at δ=0.2 (edge threshold above bg noise ~0.045,
# below the sphere-edge jump ~0.75). β=300-3000 too large (heavy clamp, CoV>1);
# rescan downward at the scale the quad scan indicated (β~O(10)).
[[variant]]
tag = "huber_b3_d20"
method = "huber"
beta = 3.0
delta = 0.2
[[variant]]
tag = "huber_b10_d20"
method = "huber"
beta = 10.0
delta = 0.2
[[variant]]
tag = "huber_b30_d20"
method = "huber"
beta = 30.0
delta = 0.2
[[variant]]
tag = "huber_b100_d20"
method = "huber"
beta = 100.0
delta = 0.2
[[variant]]
tag = "huber_b300_d20"
method = "huber"
beta = 300.0
delta = 0.2
[[variant]]
tag = "huber_b1000_d20"
method = "huber"
beta = 1000.0
delta = 0.2
[[variant]]
tag = "huber_b3000_d20"
method = "huber"
beta = 3000.0
delta = 0.2

[[variant]]
tag     = "rdp"            # Relative Difference Prior (intensity-relative; Q.Clear)
method  = "rdp"
beta    = 100.0
gamma   = 2.0
epsilon = 0.01

[[variant]]
tag    = "logcosh"         # Logcosh (smooth edge prior)
method = "logcosh"
beta   = 50.0
scalar = 3.0

# BSREM + RDP -- the convergent Q.Clear algorithm (relaxed preconditioned MAP).
# Prior enters the numerator (not the EM denominator) so it is stable under
# attenuation with NO clamp. relax/relax_gamma = STIR OSSPS defaults; β scan
# one at a time. niter raised: relaxed steps converge slower than MLEM.
[[variant]]
tag         = "bsrem_rdp_b1"
method      = "bsrem"
prior       = "rdp"
beta        = 1.0
gamma       = 2.0
epsilon     = 0.01
relax       = 1.0
relax_gamma = 0.1
niter       = 60
[[variant]]
tag         = "bsrem_rdp_b03"
method      = "bsrem"
prior       = "rdp"
beta        = 0.3
gamma       = 2.0
epsilon     = 0.01
relax       = 1.0
relax_gamma = 0.1
niter       = 60
[[variant]]
tag         = "bsrem_rdp_b05"
method      = "bsrem"
prior       = "rdp"
beta        = 0.5
gamma       = 2.0
epsilon     = 0.01
relax       = 1.0
relax_gamma = 0.1
niter       = 60
[[variant]]
tag         = "bsrem_rdp_b2"
method      = "bsrem"
prior       = "rdp"
beta        = 2.0
gamma       = 2.0
epsilon     = 0.01
relax       = 1.0
relax_gamma = 0.1
niter       = 60

[backend]
device = "metal"
