# NEMA NU-2 IQ phantom, VACUUM (air), LOW activity (3.07 MBq / 33.6 s) -- the
# gentle end of the randoms series (2.9% randoms). Contrast phantom: six hot
# spheres (Ø 10-37 mm) at 4:1. Reconstruct gold(trues) / uncorrected(prompts) /
# randoms-corrected and measure the per-sphere contrast recovery. Vacuum => n=1,
# no attenuation/scatter; the only contamination is randoms (no singles needed --
# the model is built from the truth==2 flag in sinogram coords).

tag = "nema_la_air_bgo"

[data]
lors = "/Users/jjgomezcadenas/Projects/PTCryspMC.jl/prod/nema_la_air_bgo/lors_det.h5"

[scanner]
sample_radius_mm = 405.5
afov_mm          = 1024.0

[phantom]
radius_mm = 100.0          # body cylinder radius (sinogram edge marker)

[grid]
n       = [91, 91, 73]
voxsize = 2.5              # -> extent +-112.5 (x,y), +-90 (z) mm; resolves the 10 mm sphere

[sens]
n_sample_lors = 20000000
seed          = 1

[recon]
niter = 18                 # ~converges the small spheres (see scan_niter.jl); noise then tamed by the post-filter

[postfilter]
fwhm_mm = 8.0              # Gaussian post-filter width -- the smoothness/contrast knob (scan_fwhm.jl):
                          # 8mm -> bg CoV 0.23, big spheres ~90%, 10mm ~45% (realistic NEMA rolloff)

[randoms]                  # smoothed randoms model in sinogram coords (truth==2)
n_sr      = 40
n_zm      = 40
n_dz      = 16
sr_max_mm = 200.0
zm_max_mm = 180.0
dz_max_mm = 400.0
smooth_sr = 0.0            # preserve any sharp edge at the body radius
smooth_zm = 1.5
smooth_dz = 1.0

[roi]
sphere_shrink_mm = 0.0     # sphere VOI = true diameter
bg_r_max_mm      = 30.0    # central sphere-free background ROI
bg_z_half_mm     = 10.0

[penalized]                # De Pierro quadratic-smoothness prior beta sweep (scan_penalized.jl);
betas = [0.0, 100.0, 300.0, 1000.0, 3000.0]   # beta=0 == MLEM. Scale is large here because sens ~ 567.

[backend]
device = "metal"
