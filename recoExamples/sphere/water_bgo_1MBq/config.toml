# Water, uniform sphere, 1 MBq, BGO ring (geometry matched to the air runs).
# Shared by two studies: run_att_only.jl (attenuation correction on trues;
# a_i = exp(-mu*chord) through the sphere) and run_att_scatter.jl (adds the
# scatter background, ~17%, as the contamination term; randoms ~1% dropped).

[data]
lors = "/Users/jjgomezcadenas/Projects/PTCryspMC.jl/prod/sphere_water_bgo_1MBq/lors_det.h5"

[scanner]
sample_radius_mm = 405.5
afov_mm          = 1024.0

[phantom]
radius_mm = 80.0

[attenuation]
mu_per_cm = 0.096          # linear attenuation of water at 511 keV (narrow-beam; physical constant)

[grid]
n       = [51, 51, 51]
voxsize = 4.0              # -> extent +-100 mm

[sens]
n_sample_lors = 20000000
seed          = 1

[recon]
niter = 10

[scatter]                  # smoothed scatter model in sinogram coords (run_att_scatter.jl)
n_sr   = 32                # radial-offset bins
n_zm   = 32                # axial-midpoint bins
n_dz   = 16                # obliquity bins
smooth = 1.5               # Gaussian smoothing width, in bins

[backend]
device = "metal"
