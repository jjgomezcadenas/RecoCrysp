# Case (a): uniform sphere in VACUUM, low activity — the pure-chain test.
# Reconstruct the true coincidences with the library's analytic geometric
# sensitivity and nothing else; the sphere should come back FLAT, validating the
# normalization (n=1) and the geometry match on real MC data.
#
[data]
lors = "/Users/jjgomezcadenas/Projects/PTCryspMC.jl/prod/sphere_air_bgo/lors_det.h5"

[scanner]                 # from geometry/geometry_sphere.json (cyl_shell)
sample_radius_mm = 405.5  # mid-crystal (r_inner 387 + half of 37 mm wall); DOI choice for sens
afov_mm          = 1024.0 # 2 * half_length 512 mm

[phantom]
radius_mm = 80.0          # sphere R = 8 cm at the origin

[grid]                    # covers the sphere (+ margin), not the whole AFOV
n       = [71, 71, 71]
voxsize = 2.5             # mm, isotropic -> extent +-87.5 mm. Same resolution as the
                          #    NEMA study (locked recipe), not the old coarse 4 mm.

[sens]                    # independent geometric LORs for the sensitivity image.
n_sample_lors = 500000000 # 500 M: the sensitivity Aᵀ(1) is itself a Monte-Carlo
seed          = 1         #    estimate; the NEMA study showed its ~1/sqrt(nsens)
                          #    sampling noise (not Poisson) is the background mottle.

[norm]                    # emission-based sensitivity (DOI + emission measure)
r_inner_mm    = 387.0     # crystal inner radius
wall_mm       = 37.0      # crystal thickness (DOI shell 387 -> 424 mm)
att_length_mm = 10.4      # BGO absorption length at 511 keV
fov_radius_mm = 88.0      # emission region (covers the grid)

[recon]                   # locked recipe: edge-preserving Huber (OSL MAP-EM), the
niter       = 30          #    NEMA frontier setting -- bounds the noise so we iterate
method      = "huber"     #    further to converge the contrast. "huber" | "mlem".
huber_beta  = 1000.0      # Huber strength (NEMA sweet spot)
huber_delta = 0.05        # edge threshold (NEMA value)

[postfilter]
fwhm_mm = 8.0             # only used when method="mlem"

[backend]                 # device for the projector/MLEM compute
device = "metal"            # "cpu" or "metal" (Apple GPU); the same run, one knob.
                          # The reader stays CPU-side; only the endpoint/sensitivity
                          # arrays move to the device. Default cpu so it runs anywhere.
