# Case (b): uniform sphere in VACUUM, high activity (1 MBq) — randoms kick in.
# Reconstruct all prompts (trues+randoms; vacuum, no scatter) without and with
# randoms correction, against the trues-only gold standard. Same scanner/grid and
# locked recipe as the other spheres. The randoms model is the singles-free
# sinogram model (truth==2 flag, background_estimate) — same as the NEMA study.

[data]
lors = "/Users/jjgomezcadenas/Projects/PTCryspMC.jl/prod/sphere_air_bgo_1MBq/lors_det.h5"

[scanner]
sample_radius_mm = 405.5
afov_mm          = 1024.0

[phantom]
radius_mm = 80.0

[grid]                    # extend a bit past the sphere to see the randoms background
n       = [81, 81, 81]
voxsize = 2.5             # -> extent +-100 mm. Same resolution as the NEMA study.

[sens]
n_sample_lors = 500000000 # 500 M (locked recipe): sample Aᵀ(1) below the noise floor.
seed          = 1

[recon]                   # locked recipe: edge-preserving Huber (OSL MAP-EM)
niter       = 30
method      = "huber"     # "huber" | "mlem"
huber_beta  = 1000.0
huber_delta = 0.05

[postfilter]
fwhm_mm = 8.0             # only used when method="mlem"

[randoms]                  # smoothed randoms model in sinogram coords (truth==2),
n_sr      = 40             #    singles-free — same machinery as NEMA's randoms.
n_zm      = 40
n_dz      = 16
sr_max_mm = 200.0
zm_max_mm = 180.0
dz_max_mm = 400.0
smooth_sr = 0.0            # preserve any sharp edge at the sphere footprint
smooth_zm = 1.5
smooth_dz = 1.0

[backend]
device = "metal"
